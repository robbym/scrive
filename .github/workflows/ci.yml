name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Unit, integration (a headless iced runtime — no window or GPU needed),
      # and the compiled doc examples.
      - name: Test workspace
        run: cargo test --workspace

  lints:
    name: Lints & docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (no warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Missing docs and broken intra-doc links are denied at the crate level;
      # this catches every other rustdoc warning.
      - name: Docs build clean
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings
